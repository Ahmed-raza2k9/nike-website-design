<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike - Wear your Style with Confort</title>
    <!-- Outfit Font from Google Fonts for modern geometric typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Swoosh Watermark -->
    <div class="bg-swoosh-watermark watermark-bg">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M24 7.8L6.442 15.276c-1.456.616-2.679.925-3.668.925-1.12 0-1.933-.392-2.437-1.177-.317-.504-.41-1.143-.28-1.918.13-.775.476-1.6 1.036-2.478.467-.71 1.232-1.643 2.297-2.8a6.122 6.122 0 00-.784 1.848c-.28 1.195-.028 2.072.756 2.632.373.261.886.392 1.54.392.522 0 1.11-.102 1.764-.308L24 7.8z" />
        </svg>
    </div>

    <!-- Header -->
    <header class="header">
        <!-- Nike Logo (Swoosh + Text) -->
        <div class="nike-logo-group">
            <span class="nike-wordmark">NIKE</span>
            <svg class="nike-swoosh-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M24 7.8L6.442 15.276c-1.456.616-2.679.925-3.668.925-1.12 0-1.933-.392-2.437-1.177-.317-.504-.41-1.143-.28-1.918.13-.775.476-1.6 1.036-2.478.467-.71 1.232-1.643 2.297-2.8a6.122 6.122 0 00-.784 1.848c-.28 1.195-.028 2.072.756 2.632.373.261.886.392 1.54.392.522 0 1.11-.102 1.764-.308L24 7.8z" />
            </svg>
        </div>

        <!-- Navigation Bar -->
        <nav class="nav-bar">
            <a href="#" class="nav-link active">Menu</a>
            <a href="#" class="nav-link text-all">About</a>
            <a href="#" class="nav-link text-all">Shop</a>
            <a href="#" class="nav-link text-all">Contact</a>
        </nav>

        <!-- User Profile Button -->
        <div class="user-profile-wrapper">
            <button class="profile-btn" aria-label="User Profile">
                <i class="fa-regular fa-user text-all"></i>
            </button>
        </div>
    </header>

    <!-- Main Hero Grid Layout -->
    <main class="hero-grid">
        <!-- Left Section -->
        <section class="grid-left">
            <h2 class="hero-headline text-all">Wear your Style<br>with Confort</h2>

            <div class="description-block">
                <h3 class="product-name text-all">Comfy<br>Snug</h3>
                <div class="price-row">
                    <span class="label text-all">Quality Favour</span>
                    <span class="price-new text-all">$99.50</span>
                    <span class="price-old text-all">$149.50</span>
                </div>
                <p class="description-text text-all">
                    Experience the warmth and softness in every wear! Our cozy sweaters are made with care,
                    designed for everyday comfort, and crafted to keep you stylish and relaxed.
                </p>
            </div>
        </section>

        <!-- Center Section -->
        <section class="grid-center">
            <!-- Float/Interactive Jacket Container -->
            <div class="jacket-container">
                <img class="jacket-image" id="hero-img" src="./media/jacket orange.jpg" alt="Nike Orange Puffer Jacket">
            </div>

            <!-- Bottom Controls: Slider and Price -->
            <div class="slider-and-price-section">
                <div class="large-price-display text-all">
                    $99.50
                </div>
            </div>
        </section>

        <!-- Right Section -->
        <section class="grid-right">
            <!-- Size circles -->
            <div class="sizes-row">
                <button class="size-circle active"><img src="./media/jacket orange.jpg" alt=""></button>
                <button class="size-circle"><img src="./media/jacket white.png" alt=""></button>
                <button class="size-circle"><img src="./media/jacket black.png" alt=""></button>
            </div>

            <!-- Cart and Qty at Bottom -->
            <div class="cart-controls-block">
                <div class="quantity-controller qt">
                    <button class="qty-btn text-all" aria-label="Decrease quantity">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                    <span class="qty-value text-all">3</span>
                    <button class="qty-btn text-all" aria-label="Increase quantity">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <button class="add-to-cart-btn">
                    Add to cart
                </button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
